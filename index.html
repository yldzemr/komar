<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMAR</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Genel Temizlik */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        /* Üst Logo Bölümü - MERKEZLİ */
        header {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        /* Ana Konteyner */
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 60px;
        }
        /* Bölüm Başlıkları - GİZLİ */
        .section-title {
            display: none;
        }
        .swiper {
            width: 100%;
            height: 500px;
            background: #f0f0f0;
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Slider Okları */
        .swiper-button-next, .swiper-button-prev {
            color: #ffffff !important;
            transform: scale(0.7);
        }
        /* Video Alanı (16:9) */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            background: #000000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        /* Footer Contact */
        .footer-contact {
            width: 100%;
            text-align: center;
            padding: 60px 0 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        /* Contact Button */
        .contact-btn {
            display: inline-block;
            padding: 16px 45px;
            border: 2px solid #000000;
            color: #000000;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: lowercase;
            transition: all 0.3s ease;
        }
        
        .contact-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">KOMAR</div>
    </header>
    
    <div class="container">
        <!-- Swiper Slider -->
        <div>
            <div class="swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=1200&h=800&fit=crop" alt="Film Set 1"></div>
                    <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1598899134739-24c46f58b8c0?w=1200&h=800&fit=crop" alt="Film Set 2"></div>
                    <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1490730141103-6cac27aaab94?w=1200&h=800&fit=crop" alt="Film Set 3"></div>
                    <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1479749971702-42f568dcc11e?w=1200&h=800&fit=crop" alt="Film Set 4"></div>
                </div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
            </div>
        </div>

        <!-- Video -->
        <div>
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/8hP9D5BINYw" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Footer Contact -->
        <div class="footer-contact">
            <a href="mailto:info@komar.studio" class="contact-btn">contact: info@komar.studio</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        new Swiper('.swiper', {
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
        });
    </script>
</body>
</html>
