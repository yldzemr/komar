<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMAR</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Genel Sayfa Düzeni */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Üst Başlık (Logo Bölümü) */
        header {
            width: 100%;
            max-width: 1200px;
            text-align: left;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* İçerik Konteyneri */
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 60px; /* Bölümler arası boşluk */
        }

        /* 1. BÖLÜM: Selected Frames (Slider Başlığı ve Gövdesi) */
        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .swiper {
            width: 100%;
            height: 500px; /* Masaüstü fotoğraf yüksekliği */
            background: #f0f0f0;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Slider Okları */
        .swiper-button-next, .swiper-button-prev {
            color: #ffffff !important;
            transform: scale(0.7);
        }

        /* 2. BÖLÜM: Video Alanı (16:9 Sinematik Oran) */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            background: #000000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* 3. BÖLÜM: Tam Ortalanmış Çağlar Arts Tarzı Contact Alanı */
        .footer-contact {
            text-align: center;
            padding: 60px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* Çağlar Arts Butonunun Birebir Kalın ve Tok Tasarımı */
        .contact-btn {
            display: inline-block;
            padding: 15px 40px;
            border: 2px solid #000000;
            color: #000000;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700; /* Kalın font yapısı */
            letter-spacing: 1px; /* Sıkı harf aralığı */
            text-transform: uppercase; /* Harfleri büyütür */
            transition: all 0.3s ease; /* Üzerine gelince yumuşak renk değiştirme */
        }

        /* Üzerine gelince içi simsiyah, yazısı bembeyaz olur */
        .contact-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }

        /* Sosyal Medya İkonları */
        .social-links {
            display: flex;
            gap: 25px;
            margin-top: 10px;
