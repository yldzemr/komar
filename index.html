<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMAR</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 0 20px; /* Kenarlardan taşmayı önleyen koruma boşluğu */
        }
        
        /* 1350x216 GENİŞLİK VE HACİM STANDARDINDA ÜST ALAN */
        header {
            width: 100%;
            max-width: 1350px;
            /* 216px dikey hacmi ve ortalamayı sağlayan esnek boşluk */
            padding: 85px 0; 
            display: flex;
            align-items: center;
            text-align: left;
        }
        
        .brand-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #000000;
            cursor: pointer;
        }
        
        /* LOGO ÇIKTI, SADECE JİLET GİBİ NET KURUMSAL YAZI KALDI */
        .logo-text {
            font-family: 'Inter', sans-serif !important;
            font-size: 24px !important;      
            font-weight: 700 !important;
            letter-spacing: -0.03em !important; 
            text-transform: uppercase;
            white-space: nowrap; 
        }
        
        .container {
            width: 100%;
            max-width: 1350px; /* Tüm gövde 1350px aksına oturtuldu */
            display: flex;
            flex-direction: column;
            gap: 80px; /* Tasarımda sevdiğin o sinematik boşluklar korundu */
        }

        /* TAM 16:9 FORMATINDA BOZULMA YAPMAYAN FOTOĞRAF SLIDERI */
        .swiper {
            width: 100%;
            max-width: 1350px !important;      
            aspect-ratio: 16 / 9 !important; /* Kadrajın asla bozulmaz, FX30 formatı */
            margin: 0 auto !important;
            background: #f5f5f5;
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .swiper-button-next, .swiper-button-prev {
            color: #ffffff !important;
            transform: scale(0.7);
        }
        .swiper-pagination {
            bottom: 20px !important;
        }
        .swiper-pagination-bullet {
            background-color: #ffffff !important;
            opacity: 0.6;
            width: 10px !important;
            height: 10px !important;
            transition: all 0.3s ease;
        }
        .swiper-pagination-bullet-active {
            background-color: #ffffff !important;
            opacity: 1;
            width: 12px !important;
            height: 12px !important;
        }
        
        /* VİDEO ALANI (SEVDİĞİN MEVCUT YAPI AYREN KORUNDU) */
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000000;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .play-button {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.3s ease;
        }
        .play-button:hover {
            background: #ffffff;
            transform: scale(1.1);
        }
        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 15px solid #000000;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            margin-left: 3px;
        }
        
        .footer-contact {
            width: 100%;
            text-align: center;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .contact-btn {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid #000000;
            color: #000000;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: lowercase;
            transition: all 0.4s ease;
            background-color: transparent;
        }
        .contact-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }
        .social-links {
            display: flex;
            gap: 25px;
        }
        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            color: #000000;
            text-decoration: none;
            transition: all 0.4s ease;
            opacity: 0.6;
        }
        .social-link:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .social-link svg {
            width: 28px;
            height: 28px;
            stroke: #000000;
            fill: none;
            stroke-width: 1.5;
        }
        .social-link:nth-child(2) svg {
            width: 32px;
            height: 32px;
        }

        /* 1350x167 STANDARDINDA, İNCE ÇİZGİLİ ALT ALAN (FOOTER) */
        .copyright {
            width: 100%;
            max-width: 1350px;          
            border-top: 1px solid #f0f0f0; /* İstediğin o şık ince ayraç çizgisi */
            /* Masaüstünde çizgiden tabana 167px derinlik hissi veren esnek boşluk */
            padding: 75px 0;               
            text-align: left;
            font-size: 12px;
            color: #000000;
            opacity: 0.6;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-top: 40px;            
        }

        /* MOBİL UYUM KORUMASI (Masaüstü bütünlüğünü mobilde de korur) */
        @media (max-width: 768px) {
            body {
                padding: 0 16px !important;
            }
            header {
                padding: 40px 0 !important; /* Mobilde dikey alanı daraltır */
            }
            .logo-text {
                font-size: 16px !important; 
                letter-spacing: -0.01em !important;
            }
            /* Slider mobilde de kusursuz bir 16:9 olarak küçülür */
            .swiper {
                aspect-ratio: 16 / 9 !important; 
            }
            .container {
                gap: 40px !important;
            }
            .copyright {
                padding: 40px 0 !important;
                margin-top: 20px !important;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="index.html" class="brand-link">
            <div class="logo-text">KOMAR ENTERTAINMENT</div>
        </a>
    </header>
    
    <div class="container">
        <div>
            <div class="swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=1" alt="Foto 1"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=2" alt="Foto 2"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=3" alt="Foto 3"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=4" alt="Foto 4"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=5" alt="Foto 5"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=6" alt="Foto 6"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=7" alt="Foto 7"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=8" alt="Foto 8"></div>
                </div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>

        <div>
            <div class="video-wrapper" 
                 id="videoContainer"
                 style="background-image: url('https://img.youtube.com/vi/XjPSGuJskxM/maxresdefault.jpg');"
                 onclick="playVideo()">
                <div class="play-button"></div>
            </div>
        </div>

        <div class="footer-contact">
            <a href="mailto:info@komar.studio" class="contact-btn">contact: info@komar.studio</a>
            <div class="social-links">
                <a href="https://instagram.com" target="_blank" class="social-link" title="Instagram">
                    <svg viewBox="0 0 24 24">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"></path>
                        <circle cx="18" cy="6" r="1"></circle>
                    </svg>
                </a>
                <a href="https://youtube.com" target="_blank" class="social-link" title="YouTube">
                    <svg viewBox="0 0 24 24">
                        <path d="M22.54 6.42c-.26-.92-1.04-1.65-1.94-1.88-1.7-.48-8.6-.48-8.6-.48s-6.9 0-8.6.48c-.9.23-1.68.96-1.94 1.88C1 8.12 1 12 1 12s0 3.88.46 5.58c.26.92 1.04 1.65 1.94 1.88 1.7.48 8.6.48 8.6.48s6.9 0 8.6-.48c.9-.23 1.68-.96 1.94-1.88.46-1.7.46-5.58.46-5.58s0-3.88-.46-5.58z"></path>
                        <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <div class="copyright">© 2026 All rights reserved.</div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        function playVideo() {
            document.getElementById('videoContainer').innerHTML = 
            '<iframe src="https://www.youtube.com/embed/XjPSGuJskxM?autoplay=1&mute=1" allowfullscreen></iframe>';
        }
        
        new Swiper('.swiper', {
            effect: 'fade',
            speed: 1000,
            fadeEffect: {
                crossFade: true
            },
            autoplay: {
                delay: 8000,
                disableOnInteraction: false,
            },
            loop: true,
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
        });
    </script>
</body>
</html>
