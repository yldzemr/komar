<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMAR</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Genel Temizlik */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Üst Logo Bölümü */
        header {
            width: 100%;
            max-width: 1200px;
            text-align: left;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Ana Konteyner */
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 60px; /* Bölümler arası sinematik boşluk */
        }

        /* 1. BÖLÜM: Selected Frames (Slider) */
        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .swiper {
            width: 100%;
            height: 500px;
            background: #f0f0f0;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Slider Okları */
        .swiper-button-next, .swiper-button-prev {
            color: #ffffff !important;
            transform: scale(0.7);
        }

        /* 2. BÖLÜM: Video Alanı (16:9) */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            background: #000000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* 3. BÖLÜM: Çağlar Arts Tarzı Ortalanmış Alt Alan */
        .footer-contact {
            width: 100%;
            text-align: center;
            padding: 60px 0 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* Birebir Çağlar Arts Buton Tasarımı */
        .contact-btn {
            display: inline-block;
            padding: 16px 45px; /* Kalın ve tok durması için ideal iç boşluk */
            border: 2px solid #000000; /* Çerçeve kalınlığı */
            color: #000000;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700; /* Kalın yazı tipi */
            letter-spacing: 1px; /* Harf aralığı sıkılığı */
            text-transform: lowercase; /* İstediğin gibi küçük harf standardı */
            transition: all 0.3s
