<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMAR</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* Genel Sıfırlama */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Üst Logo */
        header {
            width: 100%;
            max-width: 1200px;
            text-align: left;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Ana İçerik Alanı */
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 60px;
        }

        /* Minimalist Bölüm Başlıkları */
        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Slider Alanı */
        .swiper {
            width: 100%;
            height: 500px;
            background: #f9f9f9;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Beyaz ve Kibar Yön Okları */
        .swiper-button-next, .swiper-button-prev {
            color: #ffffff !important;
            transform: scale(0.6);
        }

        /* Sinematik Video Oranı (16:9) */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            background: #000000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Çağlar Arts Tarzı İletişim Alanı */
        .footer-contact {
            width: 100%;
            text-align: center;
            padding: 40px 0 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Tamamen küçük harf, incecik çerçeve ve kibar buton duruşu */
        .contact-btn {
            display: inline-block;
            padding: 12px 35px;
            border: 1px solid #000000;
            color: #000000;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: lowercase; /* Küçük harf standardı */
            transition: all 0.3s ease;
        }

        /* Butonun üzerine gelindiğinde içi kararır */
        .contact-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }

        /* Mobil Cihazlar İçin Optimizasyon */
        @media (max-width: 768px) {
            .swiper {
                height: 300px;
            }
            body {
                padding: 20px 10px;
            }
            .contact-btn {
                padding: 10px 25px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">KOMAR</div>
    </header>
    
    <div class="container">
        <div>
            <h2 class="section-title">Selected Frames</h2>
            <div class="swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="image1.jpg" alt="Frame 1"></div>
                    <div class="swiper-slide"><img src="image2.jpg" alt="Frame 2"></div>
                </div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
            </div>
        </div>

        <div>
            <h2 class="section-title">Video</h2>
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>
        </div>

        <div class="footer-contact">
            <h2 class="section-title">Get in Touch</h2>
            <a href="mailto:info@komar.studio" class="contact-btn">contact</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        new Swiper('.swiper', {
            loop: true, /* Son fotoğraftan sonra otomatik başa dönme aktif */
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
        });
    </script>
</body>
</html>
