<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMAR</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 20px;
        }
        header {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            margin-bottom: 80px;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #000000;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 80px;
        }
        .section-title {
            display: none;
        }
        .swiper {
            width: 100%;
            height: 550px;
            background: #f5f5f5;
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .swiper-button-next, .swiper-button-prev {
            color: #ffffff !important;
            transform: scale(0.7);
        }
        /* Slider Pagination Dots */
        .swiper-pagination {
            bottom: 20px !important;
        }
        .swiper-pagination-bullet {
            background-color: #ffffff !important;
            opacity: 0.6;
            width: 10px !important;
            height: 10px !important;
            transition: all 0.3s ease;
        }
        .swiper-pagination-bullet-active {
            background-color: #ffffff !important;
            opacity: 1;
            width: 12px !important;
            height: 12px !important;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            background: #000000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .footer-contact {
            width: 100%;
            text-align: center;
            padding: 60px 0 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .contact-btn {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid #000000;
            color: #000000;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: lowercase;
            transition: all 0.4s ease;
            background-color: transparent;
        }
        
        .contact-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">KOMAR</div>
    </header>
    
    <div class="container">
        <!-- Swiper Slider -->
        <div>
            <div class="swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=1" alt="Film Camera"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=2" alt="Camera Operator"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=3" alt="Film Production"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=4" alt="Cinema Equipment"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=5" alt="Set Lighting"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=6" alt="Film Director"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=7" alt="Movie Set"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=8" alt="Film Team"></div>
                </div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>

        <!-- Video -->
        <div>
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/XjPSGuJskxM" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Footer Contact -->
        <div class="footer-contact">
            <a href="mailto:info@komar.studio" class="contact-btn">contact: info@komar.studio</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        new Swiper('.swiper', {
            autoplay: {
                delay: 6000,
                disableOnInteraction: false,
            },
            loop: true,
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
        });
    </script>
</body>
</html>
