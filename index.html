<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMAR</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 20px;
        }
        /* Üst Logo Bölümü - Sol Üste Hizalı */
        header {
            width: 100%;
            max-width: 1200px;
            text-align: left;
            margin-bottom: 80px;
            display: flex;
            align-items: center;
            gap: 20px; /* Logo ile yazı arasındaki ideal boşluk */
        }
        .logo-icon {
            height: 50px; /* Çiçek detaylarının net görünmesi ve yazıyla oranlanması için */
            width: auto;  /* En boy oranını korur, logoyu ezmez */
            flex-shrink: 0;
        }
        .logo {
            font-family: 'Inter', sans-serif !important;
            font-size: 18px;
            font-weight: 700 !important;
            letter-spacing: -0.02em; /* Premium harf daraltması */
            text-transform: uppercase;
            color: #000000;
            line-height: 1.2;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 80px;
        }
        .swiper {
            width: 100%;
            aspect-ratio: 1200 / 800;
            max-height: 600px;
            background: #f5f5f5;
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .swiper-button-next, .swiper-button-prev {
            color: #ffffff !important;
            transform: scale(0.7);
        }
        .swiper-pagination {
            bottom: 20px !important;
        }
        .swiper-pagination-bullet {
            background-color: #ffffff !important;
            opacity: 0.6;
            width: 10px !important;
            height: 10px !important;
            transition: all 0.3s ease;
        }
        .swiper-pagination-bullet-active {
            background-color: #ffffff !important;
            opacity: 1;
            width: 12px !important;
            height: 12px !important;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000000;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .play-button {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.3s ease;
        }
        .play-button:hover {
            background: #ffffff;
            transform: scale(1.1);
        }
        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 15px solid #000000;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            margin-left: 3px;
        }
        .footer-contact {
            width: 100%;
            text-align: center;
            padding: 60px 0 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .contact-btn {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid #000000;
            color: #000000;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: lowercase;
            transition: all 0.4s ease;
            background-color: transparent;
        }
        .contact-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }
        /* Social Media Links */
        .social-links {
            display: flex;
            gap: 25px;
            margin-top: 40px;
        }
        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            color: #000000;
            text-decoration: none;
            transition: all 0.4s ease;
            opacity: 0.6;
        }
        .social-link:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .social-link svg {
            width: 28px;
            height: 28px;
            stroke: #000000;
            fill: none;
            stroke-width: 1.5;
        }
        .social-link:nth-child(2) svg {
            width: 32px;
            height: 32px;
        }
        /* Copyright */
        .copyright {
            position: static;
            width: 100%;
            text-align: left;
            padding: 60px 20px;
            font-size: 12px;
            color: #000000;
            opacity: 0.6;
            font-weight: 400;
            letter-spacing: 0.5px;
            border-top: 1px solid #f0f0f0;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" class="logo-icon" alt="KOMAR Logo">
        <div class="logo">KOMAR<br>ENTERTAINMENT</div>
    </header>
    
    <div class="container">
        <div>
            <div class="swiper">
                <div class="swiper-wrapper">

                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=2" alt="Foto 2"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=3" alt="Foto 3"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=4"
