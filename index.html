<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMAR</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* SONSUZ SAF BEYAZ FON */
        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #111111;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 0 20px;
        }
        
        /* ÜST ALAN (HEADER) */
        header {
            width: 100%;
            max-width: 1350px;
            padding: 85px 0 45px 0; 
            display: flex;
            align-items: center;
            text-align: left;
        }
        
        .brand-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #111111;
            cursor: pointer;
        }
        
        /* SCOTT FREE AYARINDA GÜÇLÜ OSWALD FONTU */
        .logo-text {
            font-family: 'Oswald', sans-serif !important;
            font-size: 26px !important;      
            font-weight: 700 !important;
            letter-spacing: 0.08em !important; 
            text-transform: uppercase;
            white-space: nowrap; 
        }
        
        /* ANA İÇERİK GÖVDESİ */
        .container {
            width: 100%;
            max-width: 1350px;
            display: flex;
            flex-direction: column;
            margin-top: 0px; 
            position: relative;
            z-index: 2; /* Üst blokların alttaki reveal alanını kapatması için */
            background-color: #ffffff; /* Arka planı kapatmak için şart */
        }

        /* VİDEO BLOK KUTUSU */
        .video-block {
            width: 100%;
            margin-bottom: 30vh !important; 
        }

        /* VİDEO ALANI */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 1350px;
            max-width: 120vh !important; 
            aspect-ratio: 16 / 9 !important; 
            margin: 0 auto !important;
            background-color: #000000 !important;
            background-image: url('https://img.youtube.com/vi/XjPSGuJskxM/maxresdefault.jpg') !important;
            background-size: cover !important; 
            background-repeat: no-repeat !important;
            background-position: center !important;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .play-button {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.3s ease;
        }
        .video-wrapper:hover .play-button {
            background: #ffffff;
            transform: scale(1.1);
        }
        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 15px solid #000000;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            margin-left: 3px;
        }

        /* FOTOĞRAF BLOK KUTUSU */
        .slider-block {
            width: 100%;
            margin-bottom: 100px; 
            background-color: #ffffff;
        }

        /* FOTOĞRAF SLIDERI */
        .swiper {
            width: 100%;
            max-width: 1350px !important;      
            max-width: 120vh !important; 
            aspect-ratio: 16 / 9 !important; 
            margin: 0 auto !important;
            background-color: #f9f9f9 !important; 
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .swiper-button-next, .swiper-button-prev {
            color: #ffffff !important;
            transform: scale(0.7);
        }
        .swiper-pagination {
            bottom: 20px !important;
        }
        .swiper-pagination-bullet {
            background-color: #ffffff !important;
            opacity: 0.6;
            width: 10px !important;
            height: 10px !important;
            transition: all 0.3s ease;
        }
        .swiper-pagination-bullet-active {
            background-color: #ffffff !important;
            opacity: 1;
            width: 12px !important;
            height: 12px !important;
        }
        
        /* ARZULADIĞIN SİNEMATİK REVEAL (AÇILIŞ) VE FADE MEKANİZMASI */
        .footer-contact {
            width: 100%;
            text-align: center;
            padding: 80px 0 50px 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
            
            /* SİHİRLİ DOKUNUŞ: Mobilde ve masaüstünde arkada sabit kalıp sonradan belirecek */
            position: relative;
            z-index: 1;
            opacity: 0; /* İlk başta tamamen gizli */
            transform: translateY(20px); /* Hafif aşağıdan yukarı süzülme etkisi */
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Sayfa aşağı kaydırılıp contact alanına gelindiğinde tetiklenecek CSS sınıfı */
        .footer-contact.visible {
            opacity: 1; /* Yumuşacık bir fade-in ile parlayacak */
            transform: translateY(0); /* Kendi orijinal yerine oturacak */
        }

        .contact-btn {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid #111111;
            color: #111111;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: lowercase;
            transition: all 0.4s ease;
            background-color: transparent;
        }
        .contact-btn:hover {
            background-color: #111111;
            color: #ffffff;
        }
        .social-links {
            display: flex;
            gap: 25px;
        }
        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            color: #111111;
            text-decoration: none;
            transition: all 0.4s ease;
            opacity: 0.6;
        }
        .social-link:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .social-link svg {
            width: 28px;
            height: 28px;
            stroke: #111111;
            fill: none;
            stroke-width: 1.5;
        }
        .social-link:nth-child(2) svg {
            width: 32px;
            height: 32px;
        }

        /* COPYRIGHT ALANI */
        .copyright {
            width: 100%;
            max-width: 1350px;          
            border-top: 1px solid #eeeeee; 
            padding: 75px 0;               
            text-align: left;
            font-size: 12px;
            color: #111111;
            opacity: 0.5;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-top: 40px;            
            position: relative;
            z-index: 2;
            background-color: #ffffff;
        }

        /* MOBİL DÜZENLEMELER */
        @media (max-width: 768px) {
            body {
                padding: 0 16px !important;
            }
            header {
                padding: 45px 0 25px 0 !important;
            }
            .logo-text {
                font-size: 18px !important; 
                letter-spacing: 0.05em !important;
            }
            .video-block {
                margin-bottom: 60px !important; /* Çöl boşluğu tamamen kaldırıldı, akış organik */
            }
            .slider-block {
                margin-bottom: 20px !important;
            }
            .video-wrapper, .swiper {
                aspect-ratio: 16 / 9 !important; 
                max-width: 100% !important; 
            }
            .footer-contact {
                padding: 60px 0 40px 0 !important; 
                gap: 25px !important;
            }
            .copyright {
                padding: 40px 0 !important;
                margin-top: 20px !important;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="index.html" class="brand-link">
            <div class="logo-text">KOMAR ENTERTAINMENT</div>
        </a>
    </header>
    
    <div class="container">
        <div class="video-block">
            <div class="video-wrapper" id="videoContainer" onclick="playVideo()">
                <div class="play-button"></div>
            </div>
        </div>

        <div class="slider-block">
            <div class="swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=1" alt="Foto 1"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=2" alt="Foto 2"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=3" alt="Foto 3"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=4" alt="Foto 4"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=5" alt="Foto 5"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=6" alt="Foto 6"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=7" alt="Foto 7"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1920/1080?random=8" alt="Foto 8"></div>
                </div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>

        <div class="footer-contact" id="revealContact">
            <a href="mailto:info@komar.studio" class="contact-btn">contact: info@komar.studio</a>
            <div class="social-links">
                <a href="https://instagram.com" target="_blank" class="social-link" title="Instagram">
                    <svg viewBox="0 0 24 24">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"></path>
                        <circle cx="18" cy="6" r="1"></circle>
                    </svg>
                </a>
                <a href="https://youtube.com" target="_blank" class="social-link" title="YouTube">
                    <svg viewBox="0 0 24 24">
                        <path d="M22.54 6.42c-.26-.92-1.04-1.65-1.94-1.88-1.7-.48-8.6-.48-8.6-.48s-6.9 0-8.6.48c-.9.23-1.68.96-1.94 1.88C1 8.12 1 12 1 12s0 3.88.46 5.58c.26.92 1.04 1.65 1.94 1.88 1.7.48 8.6.48 8.6.48s6.9 0 8.6-.48c.9-.23 1.58-.96 1.94-1.88.46-1.7.46-5.58.46-5.58s0-3.88-.46-5.58z"></path>
                        <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <div class="copyright">© 2026 All rights reserved.</div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        function playVideo() {
            document.getElementById('videoContainer').innerHTML = 
            '<iframe src="https://www.youtube.com/embed/XjPSGuJskxM?autoplay=1&mute=1" allowfullscreen></iframe>';
        }
        
        new Swiper('.swiper', {
            effect: 'fade',
            speed: 1500, 
            fadeEffect: {
                crossFade: true
            },
            autoplay: {
                delay: 7000, 
                disableOnInteraction: false,
            },
            loop: true,
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
        });

        /* KULLANICI AŞAĞI KAYDIRDIĞINDA FADE GEÇİŞİNİ TETİKLEYEN AKILLI SCRIPT (INTERSECTION OBSERVER) */
        const contactSection = document.getElementById('revealContact');
        const observerOptions = {
            root: null,
            threshold: 0.15 /* Alanın %15'i ekrana girdiğinde yumuşacık parlamaya başlasın */
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    contactSection.classList.add('visible');
                } else {
                    contactSection.classList.remove('visible'); /* Yukarı çıkarsa tekrar gizlensin ki etki kaybolmasın */
                }
            });
        }, observerOptions);

        observer.observe(contactSection);
    </script>
</body>
</html>
