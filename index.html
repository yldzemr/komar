<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMAR</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 20px;
        }
        header {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            margin-bottom: 80px;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #000000;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 80px;
        }
        .swiper {
            width: 100%;
            aspect-ratio: 1200 / 800;
            max-height: 600px;
            background: #f5f5f5;
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .swiper-button-next, .swiper-button-prev {
            color: #ffffff !important;
            transform: scale(0.7);
        }
        .swiper-pagination {
            bottom: 20px !important;
        }
        .swiper-pagination-bullet {
            background-color: #ffffff !important;
            opacity: 0.6;
            width: 10px !important;
            height: 10px !important;
            transition: all 0.3s ease;
        }
        .swiper-pagination-bullet-active {
            background-color: #ffffff !important;
            opacity: 1;
            width: 12px !important;
            height: 12px !important;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000000;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .play-button {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.3s ease;
        }
        .play-button:hover {
            background: #ffffff;
            transform: scale(1.1);
        }
        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 15px solid #000000;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            margin-left: 3px;
        }
        .footer-contact {
            width: 100%;
            text-align: center;
            padding: 60px 0 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .contact-btn {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid #000000;
            color: #000000;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: lowercase;
            transition: all 0.4s ease;
            background-color: transparent;
        }
        .contact-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }
        /* Social Media Links */
        .social-links {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }
        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border: 1px solid #000000;
            color: #000000;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.4s ease;
        }
        .social-link:hover {
            background-color: #000000;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">KOMAR</div>
    </header>
    
    <div class="container">
        <div>
            <div class="swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=1" alt="Foto 1"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=2" alt="Foto 2"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=3" alt="Foto 3"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=4" alt="Foto 4"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=5" alt="Foto 5"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=6" alt="Foto 6"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=7" alt="Foto 7"></div>
                    <div class="swiper-slide"><img src="https://picsum.photos/1200/800?random=8" alt="Foto 8"></div>
                </div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>

        <div>
            <div class="video-wrapper" 
                 id="videoContainer"
                 style="background-image: url('https://img.youtube.com/vi/XjPSGuJskxM/maxresdefault.jpg');"
                 onclick="playVideo()">
                <div class="play-button"></div>
            </div>
        </div>

        <div class="footer-contact">
            <a href="mailto:info@komar.studio" class="contact-btn">contact: info@komar.studio</a>
            <div class="social-links">
                <a href="https://instagram.com" target="_blank" class="social-link" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://youtube.com" target="_blank" class="social-link" title="YouTube">
                    <i class="fab fa-youtube"></i>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        function playVideo() {
            document.getElementById('videoContainer').innerHTML = 
            '<iframe src="https://www.youtube.com/embed/XjPSGuJskxM?autoplay=1&mute=1" allowfullscreen></iframe>';
        }
        
        new Swiper('.swiper', {
            autoplay: {
                delay: 6000,
                disableOnInteraction: false,
            },
            loop: true,
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
        });
    </script>
</body>
</html>
